services:
  app:
    image: "ccr.ccs.tencentyun.com/iskycc/mail-service:latest"
    ports:
      - "22125:22125"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PWD=send-libv
      - MYSQL_HOST=
      - MYSQL_PORT=
      - MYSQL_USER=
      - MYSQL_PWD=
      - MYSQL_DBNAME=
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=changeme
      - JWT_SECRET=your-secret-key-here
    depends_on:
      - redis
    networks:
      - send-libv

  redis:
    image: "redis:latest"
    command: ["redis-server", "--requirepass", "send-libv"]  # 直接在这里设置密码
    networks:
      - send-libv

networks:
  send-libv:
    driver: bridge