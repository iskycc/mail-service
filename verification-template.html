<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮箱验证码</title>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; color: #1a1a1a;">

  <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
    <tr>
      <td align="center" style="padding: 60px 16px;">

        <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="480" style="max-width: 480px;">

          <!-- Title -->
          <tr>
            <td style="padding-bottom: 32px;">
              <h1 style="margin: 0; font-size: 20px; font-weight: 600; color: #111; letter-spacing: -0.01em;">验证码</h1>
            </td>
          </tr>

          <!-- Code -->
          <tr>
            <td style="padding-bottom: 32px; text-align: center;">
              <span style="font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 42px; font-weight: 300; color: #111; letter-spacing: 16px;">{{code}}</span>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding-bottom: 24px;">
              <div style="height: 1px; background-color: #e5e5e5; font-size: 0; line-height: 0;"></div>
            </td>
          </tr>

          <!-- Notice -->
          <tr>
            <td style="padding-bottom: 16px;">
              <p style="margin: 0; font-size: 14px; color: #666; line-height: 1.7;">
                此验证码 5 分钟内有效，如非本人操作请忽略。
              </p>
            </td>
          </tr>

          <!-- Meta -->
          <tr>
            <td style="padding-bottom: 48px;">
              <p style="margin: 0; font-size: 12px; color: #bbb; line-height: 1.8;">
                {{time}}&nbsp;&nbsp;{{ip}}
              </p>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
